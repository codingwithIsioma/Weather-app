<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
    <link rel="stylesheet" href="styles.css" />
    <script
      src="https://kit.fontawesome.com/6a9f6daa92.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div class="page">
      <header>
        <h2 class="logo">⚡️ Weather App</h2>
      </header>
      <main>
        <section class="search-section">
          <form id="search-city">
            <input
              type="text"
              name="city"
              id="city"
              placeholder="Search for a city"
            />
            <button type="submit" class="search-btn">Search</button>
          </form>
          <div class="error-message">
            <p>
              <i class="fa-solid fa-circle-exclamation"></i> City not found.
              Please try another city.
            </p>
          </div>
        </section>
        <section class="hero-section">
          <div class="display-container"></div>
          <div class="stats-container"></div>
        </section>
        <section class="forecast-section">
          <div class="forecast-header">
            <h3 class="forecast-tag">5-DAY FORECAST</h3>
            <button class="toggle-temperature">Show in °F</button>
          </div>
          <div class="forecast-container"></div>
        </section>
      </main>
    </div>
    <script src="script.js"></script>
  </body>
</html>
